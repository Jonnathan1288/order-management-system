<main>
  <section class="w-full px-5 py-8 lg:px-10">
    @if(loading()){
    <div class="rounded-md border border-slate-200 bg-white p-6 text-slate-500">
      Cargando ...
    </div>
    }

    @if(error()){
    <div class="rounded-md border border-red-200 bg-red-50 p-4 text-sm text-red-700">
      {{ error() }}
    </div>
    }

    @if(!loading()){
    <section class="space-y-8">
      @if(templateHtml()){
      <article class="business-template overflow-hidden rounded-md border border-slate-200 bg-white"
        [innerHTML]="templateHtml()"></article>
      }
    </section>
    }
  </section>
</main>
